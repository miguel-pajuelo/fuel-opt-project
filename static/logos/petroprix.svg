<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Red background circle -->
  <circle cx="50" cy="50" r="49" fill="#E31837"/>
  <!-- Outer concentric arc (open on right, like a C) -->
  <path fill="none" stroke="white" stroke-width="6" stroke-linecap="round"
    d="M78,18 A38,38 0 1,0 78,82"/>
  <!-- Inner concentric arc -->
  <path fill="none" stroke="white" stroke-width="5" stroke-linecap="round"
    d="M70,26 A28,28 0 1,0 70,74"/>
  <!-- White P letter -->
  <text x="39" y="64" font-family="Arial Black,Arial" font-weight="900"
    font-size="36" fill="white">P</text>
  <!-- 4-point sparkle top-right -->
  <path fill="white" d="M76,22 L78,28 L84,26 L78,32 L80,38 L74,32 L68,34 L74,28 Z"
    transform="scale(0.55) translate(62,4)"/>
</svg>
