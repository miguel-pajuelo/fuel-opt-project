<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#111111" rx="6"/>
  <!-- Red accent triangles (sides of V) -->
  <polygon points="18,22 35,22 50,58" fill="#CC1020"/>
  <polygon points="82,22 65,22 50,58" fill="#CC1020"/>
  <!-- White V chevron shape -->
  <polygon points="24,22 42,22 50,52 58,22 76,22 50,72" fill="white"/>
  <!-- White curved notch at top of V -->
  <ellipse cx="50" cy="21" rx="7" ry="5" fill="#111111"/>
  <!-- VALCARCE text in white -->
  <text x="50" y="90" font-family="Arial Black,Arial" font-weight="900"
    font-size="13" fill="white" text-anchor="middle" letter-spacing="0.5">VALCARCE</text>
</svg>
