<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy background -->
  <circle cx="50" cy="50" r="49" fill="#0D1B5E"/>
  <!-- Yellow/gold sunburst rays -->
  <g fill="#FFC107" transform="translate(50,42)">
    <!-- 11 rays radiating outward -->
    <polygon points="0,-26 3,-14 -3,-14"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(30)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(60)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(90)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(120)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(150)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(180)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(210)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(240)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(270)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(300)"/>
    <polygon points="13,-22 8,-12 2,-18" transform="rotate(330)"/>
  </g>
  <!-- ESCLAT text in orange -->
  <text x="50" y="74" font-family="Arial Black,Arial" font-weight="900"
    font-size="16" fill="#FF6600" text-anchor="middle" letter-spacing="0.5">ESCLAT</text>
</svg>
